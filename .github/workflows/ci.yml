name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh

      - name: Lint scripts
        run: |
          shellcheck -s bash -e SC1091 scripts/new_case_study.sh scripts/bump_version.sh scripts/release_prepare.sh
          zsh -n scripts/new_case_study.sh
          zsh -n scripts/bump_version.sh
          zsh -n scripts/release_prepare.sh

      - name: Scaffold smoke test
        run: |
          tmp_dir="$(mktemp -d)"
          ./scripts/new_case_study.sh --target "$tmp_dir" --git --no-bootstrap ci-smoke-case-study

          test -d "$tmp_dir/ci-smoke-case-study/.git"
          test -f "$tmp_dir/ci-smoke-case-study/.vscode/settings.json"
          test -f "$tmp_dir/ci-smoke-case-study/pyproject.toml"
          test -f "$tmp_dir/ci-smoke-case-study/TEMPLATE_VERSION"
